<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .playlist-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .playlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header / Navigation -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center text-slate-600 hover:text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                <span id="backBtnText">পিছনে</span>
            </a>
            
            <h1 class="text-xl font-semibold text-slate-800" id="pageTitle">প্লেলিস্ট সমূহ</h1>

            <button id="langToggle" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium hover:bg-slate-50 transition-colors">
                English
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Loading State -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
            <p class="text-slate-500" id="loadingText">লোড হচ্ছে...</p>
        </div>

        <!-- Error State -->
        <div id="errorBox" class="hidden text-center py-20">
            <p class="text-red-500 mb-4" id="errorMsg">উউফ! ডাটা লোড করতে সমস্যা হয়েছে।</p>
            <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">Retry</button>
        </div>

        <!-- Grid -->
        <div id="playlistGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        // Replace this URL with your deployed Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7oElF5BF1jLYzcq--lHLSqVc_-esboSM-ClS5SjocKCe1hEn5r3dkkB4n6yYA9sHs/exec';
        
        let playlists = [];
        let currentLang = 'bn'; // Default language

        const uiStrings = {
            bn: {
                back: 'পিছনে',
                title: 'প্লেলিস্ট সমূহ',
                btn: 'English',
                watch: 'প্লেলিস্ট দেখুন',
                loading: 'লোড হচ্ছে...',
                error: 'ডাটা লোড করতে সমস্যা হয়েছে।'
            },
            en: {
                back: 'Back',
                title: 'Playlists',
                btn: 'বাংলা',
                watch: 'Watch on YouTube',
                loading: 'Loading...',
                error: 'Oops! Failed to load data.'
            }
        };

        // --- ELEMENTS ---
        const playlistGrid = document.getElementById('playlistGrid');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('errorBox');
        const langToggle = document.getElementById('langToggle');
        
        // --- FUNCTIONS ---

        async function fetchData() {
            loader.classList.remove('hidden');
            playlistGrid.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                // If SCRIPT_URL is default, use mock data for demo
                if (SCRIPT_URL.includes('YOUR_APPS_SCRIPT')) {
                    console.warn("Using mock data. Please update SCRIPT_URL.");
                    playlists = [
                        {
                            nameEn: "Learn Web Development",
                            nameBn: "ওয়েব ডেভেলপমেন্ট শিখুন",
                            descEn: "Full stack course for beginners.",
                            descBn: "নতুনদের জন্য পূর্ণাঙ্গ কোর্স।",
                            link: "https://youtube.com",
                            image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80"
                        },
                        {
                            nameEn: "Modern UI Design",
                            nameBn: "আধুনিক ইউআই ডিজাইন",
                            descEn: "Master Figma and design principles.",
                            descBn: "ফিগমা এবং ডিজাইনের মূলনীতি শিখুন।",
                            link: "https://youtube.com",
                            image: "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=600&q=80"
                        }
                    ];
                } else {
                    const response = await fetch(SCRIPT_URL);
                    playlists = await response.json();
                }
                
                renderPlaylists();
                loader.classList.add('hidden');
                playlistGrid.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                errorBox.classList.remove('hidden');
            }
        }

        function renderPlaylists() {
            playlistGrid.innerHTML = '';
            
            // Update static UI text
            document.getElementById('backBtnText').textContent = uiStrings[currentLang].back;
            document.getElementById('pageTitle').textContent = uiStrings[currentLang].title;
            document.getElementById('loadingText').textContent = uiStrings[currentLang].loading;
            document.getElementById('errorMsg').textContent = uiStrings[currentLang].error;
            langToggle.textContent = uiStrings[currentLang].btn;

            playlists.forEach(item => {
                const name = currentLang === 'bn' ? item.nameBn : item.nameEn;
                const desc = currentLang === 'bn' ? item.descBn : item.descEn;
                
                const card = document.createElement('div');
                card.className = 'playlist-card bg-white rounded-2xl overflow-hidden border border-slate-200 flex flex-col shadow-sm';
                
                card.innerHTML = `
                    <div class="relative h-48 w-full overflow-hidden bg-slate-100">
                        <img src="${item.image}" alt="${name}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x400?text=No+Image'">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="text-lg font-bold text-slate-800 mb-2 line-clamp-1">${name}</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-grow line-clamp-3">${desc}</p>
                        <a href="${item.link}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-all shadow-md shadow-blue-100">
                            ${uiStrings[currentLang].watch}
                        </a>
                    </div>
                `;
                playlistGrid.appendChild(card);
            });
        }

        // --- EVENT LISTENERS ---

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            renderPlaylists();
        });

        // Initialize
        window.onload = fetchData;
    </script>
</body>
</html>
